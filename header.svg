<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="48%" stop-color="#06101F"></stop>
      <stop offset="100%" stop-color="#0B1B35"></stop>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.38"></stop>
      <stop offset="45%" stop-color="#0F172A" stop-opacity="0.16"></stop>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="titleShine" x1="-300" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0F2FE"></stop>
      <stop offset="35%" stop-color="#E0F2FE"></stop>
      <stop offset="50%" stop-color="#FFFFFF"></stop>
      <stop offset="65%" stop-color="#93C5FD"></stop>
      <stop offset="100%" stop-color="#E0F2FE"></stop>

      <animate attributeName="x1" values="-500;300;1200;-500" dur="6s" repeatCount="indefinite"></animate>
      <animate attributeName="x2" values="-100;700;1600;-100" dur="6s" repeatCount="indefinite"></animate>
    </linearGradient>

    <linearGradient id="boxBlue" x1="0" y1="0" x2="0" y2="90">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="50%" stop-color="#1D4ED8"></stop>
      <stop offset="100%" stop-color="#0F255F"></stop>
    </linearGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#E0F2FE" stroke-opacity="0.045" stroke-width="1"></path>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="0 42" dur="18s" repeatCount="indefinite"></animateTransform>
    </pattern>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="bigBlur">
      <feGaussianBlur stdDeviation="30"></feGaussianBlur>
    </filter>

    <filter id="boxGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <clipPath id="typingClip">
      <rect x="22" y="0" width="0" height="38">
        <animate attributeName="width" values="0;230;230;0;0" keyTimes="0;0.48;0.72;0.9;1" dur="6s" repeatCount="indefinite"></animate>
      </rect>
    </clipPath>

    <style>
      .title {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 70px;
        font-weight: 800;
        letter-spacing: 5px;
      }

      .subtitle {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 2px;
      }

      .terminal {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        letter-spacing: 1px;
      }

      .glowPulse {
        animation: glowPulse 5s ease-in-out infinite;
        transform-origin: center;
      }

      .dotA {
        animation: dotA 5.5s ease-in-out infinite;
      }

      .dotB {
        animation: dotB 7s ease-in-out infinite;
      }

      .subtitlePulse {
        animation: subtitlePulse 4.5s ease-in-out infinite;
      }

      .terminalBox {
        animation: terminalBox 6s ease-in-out infinite;
      }

      .cursor {
        animation: cursorBlink 1s steps(2, start) infinite;
      }

      .timeBox {
        transform-origin: center;
        animation: timeBoxFlight 9s ease-in-out infinite;
      }

      .timeBoxLamp {
        animation: lampBlink 1.8s ease-in-out infinite;
      }

      .timeTrail {
        animation: trailPulse 2.8s ease-in-out infinite;
      }

      @keyframes glowPulse {
        0%, 100% {
          opacity: 0.75;
          transform: scale(1);
        }

        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }

      @keyframes dotA {
        0%, 100% {
          opacity: 0.25;
          transform: translateY(0);
        }

        50% {
          opacity: 0.8;
          transform: translateY(-10px);
        }
      }

      @keyframes dotB {
        0%, 100% {
          opacity: 0.2;
          transform: translateY(0);
        }

        50% {
          opacity: 0.65;
          transform: translateY(12px);
        }
      }

      @keyframes subtitlePulse {
        0%, 100% {
          opacity: 0.7;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes terminalBox {
        0%, 100% {
          stroke-opacity: 0.35;
        }

        50% {
          stroke-opacity: 0.75;
        }
      }

      @keyframes cursorBlink {
        0%, 45% {
          opacity: 1;
        }

        46%, 100% {
          opacity: 0;
        }
      }

      @keyframes timeBoxFlight {
        0%, 100% {
          transform: translate(0, 0) rotate(-7deg);
          opacity: 0.9;
        }

        25% {
          transform: translate(-18px, 10px) rotate(-3deg);
          opacity: 1;
        }

        50% {
          transform: translate(-34px, -4px) rotate(-9deg);
          opacity: 0.95;
        }

        75% {
          transform: translate(-14px, -12px) rotate(-5deg);
          opacity: 1;
        }
      }

      @keyframes lampBlink {
        0%, 100% {
          opacity: 0.45;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes trailPulse {
        0%, 100% {
          opacity: 0.12;
          transform: scaleX(0.92);
        }

        50% {
          opacity: 0.38;
          transform: scaleX(1.08);
        }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#background)"></rect>

  <rect width="1200" height="360" rx="32" fill="url(#grid)" opacity="0.75"></rect>

  <ellipse cx="600" cy="160" rx="380" ry="130" fill="url(#centerGlow)" class="glowPulse" filter="url(#bigBlur)"></ellipse>

  <g class="dotA">
    <circle cx="205" cy="92" r="3" fill="#60A5FA"></circle>
    <circle cx="290" cy="266" r="2.4" fill="#93C5FD"></circle>
    <circle cx="1005" cy="88" r="3" fill="#3B82F6"></circle>
  </g>

  <g class="dotB">
    <circle cx="165" cy="215" r="2.5" fill="#1D4ED8"></circle>
    <circle cx="945" cy="265" r="3" fill="#60A5FA"></circle>
    <circle cx="1065" cy="198" r="2" fill="#93C5FD"></circle>
  </g>

  <g class="timeTrail" transform="translate(920 72)">
    <path d="M0 26 C38 6, 78 8, 116 18" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.6"></path>
    <path d="M10 44 C46 28, 86 30, 126 38" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" opacity="0.45"></path>
  </g>

  <g class="timeBox" transform="translate(1012 56)" filter="url(#boxGlow)">
    <rect x="22" y="0" width="26" height="10" rx="3" fill="#93C5FD" class="timeBoxLamp"></rect>
    <rect x="16" y="10" width="38" height="8" rx="2" fill="#0F255F" stroke="#60A5FA" stroke-opacity="0.65"></rect>

    <rect x="10" y="18" width="50" height="82" rx="4" fill="url(#boxBlue)" stroke="#93C5FD" stroke-opacity="0.65"></rect>
    <rect x="15" y="25" width="40" height="10" rx="2" fill="#020617" fill-opacity="0.65" stroke="#60A5FA" stroke-opacity="0.35"></rect>

    <rect x="17" y="42" width="14" height="20" rx="2" fill="#020617" fill-opacity="0.35" stroke="#93C5FD" stroke-opacity="0.45"></rect>
    <rect x="39" y="42" width="14" height="20" rx="2" fill="#020617" fill-opacity="0.35" stroke="#93C5FD" stroke-opacity="0.45"></rect>
    <rect x="17" y="69" width="14" height="22" rx="2" fill="#020617" fill-opacity="0.35" stroke="#93C5FD" stroke-opacity="0.45"></rect>
    <rect x="39" y="69" width="14" height="22" rx="2" fill="#020617" fill-opacity="0.35" stroke="#93C5FD" stroke-opacity="0.45"></rect>

    <line x1="35" y1="18" x2="35" y2="100" stroke="#93C5FD" stroke-opacity="0.35"></line>
    <circle cx="38" cy="75" r="1.7" fill="#93C5FD"></circle>

    <rect x="7" y="100" width="56" height="7" rx="2" fill="#0F255F" stroke="#60A5FA" stroke-opacity="0.5"></rect>
  </g>

  <text x="600" y="148" text-anchor="middle" class="title" fill="url(#titleShine)" filter="url(#softGlow)">
    THIAGO PATRIOTA
  </text>

  <text x="600" y="192" text-anchor="middle" class="subtitle subtitlePulse" fill="#93C5FD">
    SOFTWARE ENGINEERING STUDENT · FULLSTACK WEB · LEARNING GAME DEV
  </text>

  <g transform="translate(403 240)">
    <rect x="0" y="0" width="394" height="38" rx="11" fill="#020617" fill-opacity="0.72" stroke="#2563EB" stroke-opacity="0.45" class="terminalBox"></rect>

    <text x="22" y="25" class="terminal" fill="#60A5FA" clip-path="url(#typingClip)">
      $ git init &amp;&amp; npm init -y
    </text>

    <rect x="22" y="11" width="9" height="17" fill="#93C5FD" class="cursor">
      <animate attributeName="x" values="22;252;252;22;22" keyTimes="0;0.48;0.72;0.9;1" dur="6s" repeatCount="indefinite"></animate>
    </rect>
  </g>
</svg>